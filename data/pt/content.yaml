# Profile: Profissional com 7 anos de experiência como Secretária Executiva, com trajetória que demonstra evolução da recepção à atuação direta com a diretoria. Competência na gestão de agendas, organização de viagens nacionais e internacionais, logística de reuniões, videoconferências, compromissos de diretoria e preparação de documentos. Comunicação clara e eficaz, discrição absoluta no manejo de informações sensíveis e foco em resultados. Organizada, proativa e comprometida em oferecer um suporte de excelência à diretoria, contribuindo para a produtividade e o bom funcionamento da operação.

# Profile: Secretária Executiva com 7 anos de experiência em suporte à diretoria, atuando na gestão de agendas, organização de viagens e coordenação de reuniões corporativas e videoconferências.<br>Experiência em interface com clientes e lideranças, comunicação corporativa e redação formal, gestão de documentos corporativos com alto nível de confidencialidade.<br>Destaca-se pela organização, proatividade e gestão eficientes de prioridades, contribuindo para a produtividade da diretoria e para a fluidez das operações administrativas.

Profile: Estudante de Direito (8º semestre) com experiência profissional em ambiente institucional e suporte à diretoria. Possuo vivência em organização de documentos, gestão de informações confidenciais e comunicação corporativa.<br>Experiência em rotinas administrativas, organização de agendas institucionais, elaboração de documentos formais e interface com profissionais da área jurídica e tributária.<br>Busco oportunidade de estágio jurídico para desenvolver competências práticas em pesquisa jurídica, análise documental e apoio a atividades processuais.

